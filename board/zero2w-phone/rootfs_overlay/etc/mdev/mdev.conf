# mdev.conf for 4STM4 Mobile OS

# Serial ports (SIM800L on ttyAMA0)
ttyAMA[0-9]     root:dialout   0660
ttyUSB[0-9]     root:dialout   0660

# Input devices (touchscreen, buttons)
event[0-9]      root:input     0660
mice            root:input     0660

# DRM / framebuffer
card[0-9]       root:video     0660
renderD[0-9]+   root:render    0660
fb[0-9]         root:video     0660

# I2C (for HAT EEPROM, AXP20x)
i2c-[0-9]       root:i2c       0660

# SPI
spidev[0-9].*   root:spi       0660

# Sound (if present)
snd/.*          root:audio     0660

# USB gadget / OTG
ttyGS[0-9]      root:dialout   0660

# Catchall
.*              root:root      0600
