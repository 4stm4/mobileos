# watchdog.conf — hardware watchdog for 4STM4 Mobile OS
# Managed by watchdogd (package: watchdog)

# Hardware watchdog device
watchdog-device         = /dev/watchdog

# Kick interval — must be < kernel watchdog timeout (default 15s on RPi)
watchdog-timeout        = 15
interval                = 5

# Reboot on watchdog timeout (not soft kill)
realtime                = yes
priority                = 1

# Monitor: reboot if load average 1-min exceeds threshold
max-load-1              = 24

# Monitor: reboot if free memory drops below 4MB
min-memory              = 1024

# Log to syslog
log-dir                 = /var/log
