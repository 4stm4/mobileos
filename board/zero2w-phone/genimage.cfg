image boot.vfat {
    vfat {
        files = {
            "Image.gz",
            "bcm2710-rpi-zero-2-w.dtb",
            "overlays/vc4-kms-v3d.dtbo",
            "overlays/uart0.dtbo",
            "overlays/disable-bt.dtbo",
            "overlays/dwc2.dtbo",
            "rpi-firmware/bootcode.bin",
            "rpi-firmware/fixup.dat",
            "rpi-firmware/start.elf",
            "rpi-firmware/config.txt",
            "rpi-firmware/cmdline.txt",
            "bcm2710-rpi-zero-2.dtb",
        }
    }
    size = 64M
}

image rootfs.ext4 {
    ext4 {}
}

image sdcard.img {
    hdimage {
        gpt = false
    }

    partition boot {
        partition-type = 0x0C
        bootable = true
        image = "boot.vfat"
        size = 64M
    }

    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
    }
}
